name: RISC-V Vector Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y autoconf automake build-essential bison flex texinfo gperf libtool \
          patchutils bc cmake libglib2.0-dev libpixman-1-dev libslirp-dev ninja-build \
          libmpc-dev libmpfr-dev libgmp-dev zlib1g-dev libexpat-dev \
          libgtest-dev  # <-- ADDED: needed for make test

    - name: Cache RISC-V Toolchain
      id: cache-riscv
      uses: actions/cache@v4
      with:
        path: /home/runner/riscv-toolchain
        key: ${{ runner.os }}-riscv-toolchain-rv64gcv

    - name: Build RISC-V Toolchain
      if: steps.cache-riscv.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/riscv-collab/riscv-gnu-toolchain --recursive --depth 1 --shallow-submodules
        cd riscv-gnu-toolchain
        ./configure --prefix=/home/runner/riscv-toolchain --with-arch=rv64gcv --with-abi=lp64d
        make -j$(nproc)

    - name: Cache QEMU
      id: cache-qemu
      uses: actions/cache@v4
      with:
        path: /home/runner/qemu-install
        key: ${{ runner.os }}-qemu-riscv64

    - name: Build QEMU
      if: steps.cache-qemu.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/qemu/qemu --depth 1
        cd qemu
        ./configure --target-list=riscv64-linux-user --enable-plugins --prefix=/home/runner/qemu-install
        make -j$(nproc)
        make install

    - name: Generate Dummy Input Image
      run: dd if=/dev/urandom of=input.raw bs=1 count=65536

    # ADDED: Run GoogleTest suite natively — no RISC-V toolchain needed for this
    - name: Build and Run Host Tests
      run: |
        cd /usr/src/googletest
        sudo cmake .
        sudo make
        sudo cp lib/*.a /usr/lib
        cd $GITHUB_WORKSPACE
        make test

    - name: Compile RISC-V Binary
      run: |
        export PATH="/home/runner/riscv-toolchain/bin:$PATH"
        make

    # CHANGED: sweep all three VLEN values instead of just 128
    - name: Run QEMU at VLEN=128
      run: |
        export PATH="/home/runner/riscv-toolchain/bin:/home/runner/qemu-install/bin:$PATH"
        qemu-riscv64 -cpu rv64,v=true,vlen=128 ./canny input.raw 256 256 output_128.raw

    - name: Run QEMU at VLEN=256
      run: |
        export PATH="/home/runner/riscv-toolchain/bin:/home/runner/qemu-install/bin:$PATH"
        qemu-riscv64 -cpu rv64,v=true,vlen=256 ./canny input.raw 256 256 output_256.raw

    - name: Run QEMU at VLEN=512
      run: |
        export PATH="/home/runner/riscv-toolchain/bin:/home/runner/qemu-install/bin:$PATH"
        qemu-riscv64 -cpu rv64,v=true,vlen=512 ./canny input.raw 256 256 output_512.raw