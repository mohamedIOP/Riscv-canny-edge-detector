name: RISC-V Vector Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. Install all system dependencies required for building from source
    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y autoconf automake build-essential bison flex texinfo gperf libtool patchutils bc cmake libglib2.0-dev libpixman-1-dev libslirp-dev ninja-build libmpc-dev libmpfr-dev libgmp-dev zlib1g-dev libexpat-dev

    # 2. Check if we already built the toolchain in a previous run to save time
    - name: Cache RISC-V Toolchain
      id: cache-riscv
      uses: actions/cache@v4
      with:
        path: /home/runner/riscv-toolchain
        key: ${{ runner.os }}-riscv-toolchain-rv64gcv

    # 3. Build the toolchain ONLY if it wasn't found in the cache
    - name: Build RISC-V Toolchain
      if: steps.cache-riscv.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/riscv-collab/riscv-gnu-toolchain --recursive --depth 1 --shallow-submodules
        cd riscv-gnu-toolchain
        ./configure --prefix=/home/runner/riscv-toolchain --with-arch=rv64gcv --with-abi=lp64d
        make -j$(nproc)

    # 4. Check if we already built QEMU in a previous run
    - name: Cache QEMU
      id: cache-qemu
      uses: actions/cache@v4
      with:
        path: /home/runner/qemu-install
        key: ${{ runner.os }}-qemu-riscv64

    # 5. Build QEMU ONLY if it wasn't found in the cache
    - name: Build QEMU
      if: steps.cache-qemu.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/qemu/qemu --depth 1
        cd qemu
        ./configure --target-list=riscv64-linux-user --enable-plugins --prefix=/home/runner/qemu-install
        make -j$(nproc)
        make install

    # Create the test file required by the syscalls
    - name: Generate Dummy Input Image
      run: dd if=/dev/urandom of=input.raw bs=1 count=65536

    # 6. Compile the code using the newly built compiler
    - name: Compile Code
      run: |
        export PATH="/home/runner/riscv-toolchain/bin:$PATH"
        make

    # 7. Test the code using the newly built emulator
    - name: Run QEMU Test
      run: |
        export PATH="/home/runner/riscv-toolchain/bin:/home/runner/qemu-install/bin:$PATH"
        make run